mixed-port: 7890
allow-lan: true
mode: Rule
log-level: info
ipv6: true
proxies: []
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - <countries>
      - 手动切换
      - DIRECT
  - name: 手动切换
    type: select
    proxies:
      - <all>
  - name: OpenAI
    type: select
    proxies:
      - 节点选择
      - <countries>
      - 手动切换
      - DIRECT
  - name: 国外媒体
    type: select
    proxies:
      - 节点选择
      - <countries>
      - 手动切换
      - DIRECT
  - name: Telegram
    type: select
    proxies:
      - 节点选择
      - <countries>
      - 手动切换
      - DIRECT
  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - <countries>
      - 手动切换
      - DIRECT
rules:
  - GEOSITE,openai,OpenAI
  - GEOSITE,telegram,Telegram
  - GEOSITE,geolocation-!cn,国外媒体
  - GEOIP,private,DIRECT
  - MATCH,漏网之鱼
